<!DOCTYPE html>
<html>
<head>
    <title>My First Django Template</title>
</head>
<body>
     <h1>Questions</h1>
    <ul>
        {% for q in questions %}
            <li>{{ q.question_text }}</li>
        {% empty %}
            <li>No questions available.</li>
        {% endfor %}
    </ul>
</body>
</html>
